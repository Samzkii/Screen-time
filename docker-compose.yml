services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: screentime-db
    environment:
      POSTGRES_USER: screentime_user
      POSTGRES_PASSWORD: screentime_password
      POSTGRES_DB: screentime_dev
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
      # Initialize database schema
      - ./lib/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screentime_user -d screentime_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - screentime-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: screentime-app
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://screentime_user:screentime_password@postgres:5432/screentime_dev
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this-in-production}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-nextauth-secret-change-this-in-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source code for development (remove for production)
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - screentime-network
    restart: unless-stopped

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: screentime-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - screentime-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  screentime-network:
    driver: bridge
