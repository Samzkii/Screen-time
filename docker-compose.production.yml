version: '3.8'

# Production docker-compose.yml
# Usage: docker-compose -f docker-compose.production.yml up -d

services:
  # PostgreSQL Database with backups
  postgres:
    image: postgres:15-alpine
    container_name: screentime-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-screentime_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${DB_NAME:-screentime_prod}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./lib/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./scripts/backup.sh:/backup.sh
    environment:
      PGBACKUPS: /backups
    volumes:
      - postgres_backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-screentime_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - screentime-prod
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Application
  app:
    image: screentime:latest
    container_name: screentime-app-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-screentime_user}:${DB_PASSWORD:-change-me}@postgres:5432/${DB_NAME:-screentime_prod}
      JWT_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://yourapp.com}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      VERCEL_ENV: production
    ports:
      - "3000:3000"
    networks:
      - screentime-prod
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Reverse Proxy / Load Balancer (optional)
  nginx:
    image: nginx:1.24-alpine
    container_name: screentime-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - screentime-prod
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: screentime-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - screentime-prod
    restart: always

volumes:
  postgres_data_prod:
    driver: local
  postgres_backups:
    driver: local
  prometheus_data:
    driver: local

networks:
  screentime-prod:
    driver: bridge
